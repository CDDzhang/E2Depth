ddp:  
  ddp_enable: False
  world_size: 1
  gpus: [0]

model:
  depth_model: 'dino'
  pose_model: 'concat'
  
  # dino model parameters 
  intermediate_layer_idx: [2, 5, 8, 11]  
  dino_model: 'vits'
  dino_patch_size: 16
  dino_feat_dim: 384 
  dino_reduce_dim: 256
  freeze: True

  # Pose encoder structure 
  num_layers: 18
  weights_init: True
  fusion_feat_in_dim: 128
  fusion_feat_out_dim: [64, 128, 256, 256]
  fusion_feat_size: [24, 40]
  use_aspp: True 
  
  # define the 3D voxel space  
  voxel_unit_size: [1.5, 1.5, 1.5] # size of unit voxel in (m), [x, y, z]
  voxel_size: [100, 100, 20] # num of voxels in each dimension. [x, y, z]
  voxel_str_p: [-75.0, -75.0, -15.0] # voxel start point [x, y, z]
  voxel_pre_dim: [64] 
  proj_d_bins: 50
  proj_d_str: 1
  proj_d_end: 75

pose:
  noise_rot_sigma: 0.001
  noise_trans_sigma: 0.1
  gt_drop_prob: 0.1
  trans_clamp: 4.0
  noise_warmup_steps: 2000


data:  
  data_path: '/home/bit/Dataset/ddad/raw_data/ddad.json'
  log_dir: '/home/bit/Projects/E2Depth/results/'
  dataset: 'ddad'
  back_context: 1  
  forward_context: 1
  depth_type: 'lidar'
  cameras: ['camera_01', 'camera_05', 'camera_06', 'camera_07', 'camera_08', 'camera_09']
  train_requirements: (gt_pose, gt_depth, mask)  
  val_requirements: (gt_pose, gt_depth, mask)

training: 
  # Basic
  height: 384  
  width: 640
  scales: [0] 
  frame_ids: [0, -1, 1]  
  val_num: 8 

  # learning rate
  pose_lr: 0.0001      
  depth_lr: 0.0001     

  # optimization
  batch_size: 1
  num_workers: 8
  learning_rate: 0.0001 
  num_epochs: 15
  scheduler_step_size: 15

  # model / loss setting
  min_depth: 1.5
  max_depth: 200.0

  ## intensity align
  intensity_align: True
  
  ## focal length scaling
  focal_length_scale: 300

  ## depth synthesis
  aug_depth: False
  aug_angle: [15, 15, 40] 

# Loss hyperparams
loss:
  ## spatio & temporal
  spatio: True
  spatio_temporal: True
  pose_consist: False
  super_depth: True
  geo_consist: False

  disparity_smoothness: 0.001
  spatio_coeff: 0.05
  spatio_tempo_coeff: 0.1
  pose_loss_coeff: 0.0
  depth_loss_coeff: 0.1
  berhu_loss_coeff: 0.3
  bias_loss_coeff: 0.1
  berhu_rel_thr: 0.05
  geo_coeff: 0.05

  geo_downsample: 4     
  geo_ref_cams: [0]    
  geo_use_dataset_mask: True
  geo_use_inv: True
  geo_charb_eps: 0.001
  geo_use_margin: True
  geo_margin: 0.05
  
eval:
  eval_batch_size: 4
  eval_num_workers: 8
  eval_min_depth: 0.01
  eval_max_depth: 200
  eval_visualize: False
  syn_visualize: False
  syn_idx: 245
  
load:
  pretrain: False
  load_weights_dir: ''
  models_to_load: ['depth_net', 'pose_net']
  
logging:
  early_phase: 2000
  log_frequency: 100
  late_log_frequency: 1000
  save_frequency: 1